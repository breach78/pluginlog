<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brain Unfog 기능 관리 체크리스트</title>
  <style>
    :root {
      color-scheme: light; --bg: #f5f6f8; --panel: #fff; --panel-soft: #eef2f7; --text: #1f252e; --muted: #667085;
      --line: #d8dee8; --accent: #2563eb; --accent-soft: #dbeafe; --danger: #b42318; --warn: #a15c07; --ok: #027a48; --radius: 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); min-width: 320px; }
    button, input, textarea { font: inherit; }
    .topbar { position: sticky; top: 0; z-index: 20; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--line); background: rgba(245, 246, 248, 0.94); backdrop-filter: blur(12px); }
    h1 { margin: 0 0 6px; font-size: 22px; line-height: 1.2; letter-spacing: 0; }
    .lede { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .stats { display: grid; grid-template-columns: repeat(6, minmax(64px, auto)); gap: 8px; }
    .stat { min-width: 74px; padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); text-align: right; }
    .stat strong { display: block; font-size: 19px; line-height: 1.1; }
    .stat span, .field label, .checkline { color: var(--muted); font-size: 11px; }
    .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 18px; padding: 18px 24px 32px; }
    .sidebar { position: sticky; top: 95px; align-self: start; display: grid; gap: 12px; max-height: calc(100vh - 115px); overflow: auto; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); }
    .field, .nav, .groups, .items { display: grid; }
    .field, .nav { gap: 6px; }
    input[type="search"] { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--text); }
    .checkline { display: flex; align-items: center; gap: 8px; }
    .actions, .status-filter { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { min-height: 34px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel-soft); color: var(--text); cursor: pointer; }
    button:hover { border-color: #a8b3c4; background: #e8edf4; }
    .nav button { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; padding: 8px 10px; text-align: left; background: #fff; }
    .nav button.active, .status-filter button.active { border-color: var(--accent); background: var(--accent-soft); color: #173b8f; }
    .output { min-height: 160px; resize: vertical; padding: 10px; border: 1px solid var(--line); border-radius: var(--radius); background: #fcfcfd; color: #344054; font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .groups { gap: 16px; min-width: 0; }
    .group { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; }
    .group-header { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; padding: 16px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .group h2 { margin: 0 0 5px; font-size: 17px; letter-spacing: 0; }
    .group-note { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .group-actions { display: flex; gap: 8px; white-space: nowrap; }
    .item { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .item:last-child { border-bottom: 0; }
    .item.tracked { background: #fffdf7; }
    .trackers { display: grid; grid-template-columns: repeat(4, minmax(48px, 1fr)); gap: 6px; align-self: start; min-width: 224px; }
    .track { display: inline-flex; align-items: center; justify-content: center; gap: 5px; min-height: 28px; padding: 4px 7px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: #344054; font-size: 12px; white-space: nowrap; }
    .track input { width: 18px; height: 18px; margin: 0; }
    .track-remove:has(input:checked), .badge.core { color: var(--danger); border-color: #f0b8b0; background: #fff1f0; }
    .track-bug:has(input:checked), .badge.high { color: var(--warn); border-color: #f7c57b; background: #fff8eb; }
    .track-finish:has(input:checked), .badge.mid { color: #175cd3; border-color: #b2ccff; background: #eff4ff; }
    .track-add:has(input:checked), .badge.blocked { color: #5925dc; border-color: #d9d6fe; background: #f4f3ff; }
    .badge.low { color: var(--ok); border-color: #a6f4c5; background: #ecfdf3; }
    .item-title { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 0 0 4px; font-weight: 650; line-height: 1.35; }
    .item-detail { margin: 0; color: #475467; font-size: 13px; line-height: 1.48; }
    .source { margin-top: 6px; color: var(--muted); font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .badges { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 5px; min-width: 154px; max-width: 220px; }
    .badge { display: inline-flex; align-items: center; min-height: 22px; padding: 2px 7px; border: 1px solid var(--line); border-radius: 999px; background: #fff; color: #344054; font-size: 11px; white-space: nowrap; }
    .empty { display: none; padding: 28px; border: 1px dashed var(--line); border-radius: var(--radius); background: var(--panel); color: var(--muted); text-align: center; }
    @media (max-width: 980px) { .topbar, .group-header { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(3, 1fr); } .layout { grid-template-columns: 1fr; } .sidebar { position: static; max-height: none; } }
    @media (max-width: 640px) { .topbar, .layout { padding-left: 14px; padding-right: 14px; } .item { grid-template-columns: minmax(0, 1fr); } .trackers, .badges { grid-column: 1; justify-content: flex-start; max-width: none; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Brain Unfog 기능 관리 체크리스트</h1>
      <p class="lede">삭제 후보, 버그, 완성 필요, 추가 필요 상태를 기능별로 따로 체크합니다. 체크는 이 브라우저의 localStorage에만 저장되며, 코드 변경은 아직 수행하지 않습니다.</p>
    </div>
    <div class="stats" aria-live="polite">
      <div class="stat"><strong id="totalCount">0</strong><span>전체 기능</span></div>
      <div class="stat"><strong id="removeCount">0</strong><span>삭제</span></div>
      <div class="stat"><strong id="bugCount">0</strong><span>버그</span></div>
      <div class="stat"><strong id="finishCount">0</strong><span>완성</span></div>
      <div class="stat"><strong id="addCount">0</strong><span>추가</span></div>
      <div class="stat"><strong id="visibleCount">0</strong><span>현재 표시</span></div>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="field">
        <label for="searchInput">기능명, 설명, 파일 경로 검색</label>
        <input id="searchInput" type="search" placeholder="예: 캘린더, 첨부, 타임라인, Obsidian">
      </div>
      <label class="checkline"><input id="onlyCheckedInput" type="checkbox"> 상태 체크된 기능만 보기</label>
      <div id="statusFilter" class="status-filter" aria-label="상태 필터"></div>
      <div class="actions">
        <button id="copyButton" type="button">체크 목록 복사</button>
        <button id="clearButton" type="button">전체 해제</button>
      </div>
      <nav id="categoryNav" class="nav" aria-label="기능 그룹"></nav>
      <textarea id="selectionOutput" class="output" readonly spellcheck="false" aria-label="체크된 상태 목록"></textarea>
    </aside>

    <section>
      <div id="groups" class="groups"></div>
      <div id="emptyState" class="empty">검색 조건에 맞는 기능이 없습니다.</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "brain-unfog-feature-worklog-v2";
    const LEGACY_STORAGE_KEY = "brain-unfog-feature-checklist-v1";
    const TRACKS = [
      { id: "remove", label: "삭제", output: "삭제 후보" },
      { id: "bug", label: "버그", output: "버그 추적" },
      { id: "finish", label: "완성", output: "완성 필요" },
      { id: "add", label: "추가", output: "추가 필요" }
    ];

    const featureGroups = [
      {
        id: "timeline",
        title: "타임라인 뷰",
        note: "프로젝트를 날짜 축 위에 배치하고, 프로젝트별 작업과 계획 구간을 조작하는 화면 기능입니다.",
        items: [
          { id: "timeline.board-grid", name: "날짜 기반 타임라인 보드", detail: "오늘 기준 과거/미래 범위를 렌더링하고 날짜 헤더, 월 라벨, 수평 스크롤 위치를 관리합니다.", source: "Features/Timeline/TimelineBoardView.swift; TimelineBoardRefresh.swift", risk: "core", kind: "화면" },
          { id: "timeline.today-zoom", name: "오늘 이동 및 날짜 폭 줌", detail: "헤더의 Today 버튼과 확대/축소 버튼으로 타임라인 컬럼 폭과 스크롤 위치를 조정합니다.", source: "Features/Workspace/MainWorkspaceChrome.swift; Features/Timeline/TimelineBoardRefresh.swift", risk: "mid", kind: "조작" },
          { id: "timeline.project-rows", name: "프로젝트 행과 막대 렌더링", detail: "프로젝트별 시작일, 마감일, 활성 구간, 진행 상태를 막대와 세그먼트로 보여줍니다.", source: "Features/Timeline/TimelineBoardRows.swift; TimelineBoardSupport.swift", risk: "core", kind: "화면" },
          { id: "timeline.stage-rail", name: "Do/Decide/Area/Later 단계 레일", detail: "프로젝트를 단계별로 구분하고 행 배경, 경계, 메뉴를 통해 단계를 변경합니다.", source: "Models/Enums.swift; Features/Timeline/TimelineBoardRows.swift; TimelineBoardActions.swift", risk: "high", kind: "분류" },
          { id: "timeline.project-sorting", name: "프로젝트 정렬", detail: "타임라인에서 수동, 최근, 제목, 우선순위 정렬을 제공하고 Reminders 순서로 초기 수동 정렬을 시드합니다.", source: "Features/Timeline/TimelineBoardView.swift; Features/Workspace/MainWorkspaceSidebar.swift", risk: "high", kind: "상태" },
          { id: "timeline.project-create", name: "타임라인 프로젝트 생성", detail: "타임라인 맥락에서 새 Reminders 목록과 app-owned 프로젝트 상태를 생성합니다.", source: "Features/Timeline/TimelineBoardActions.swift; App/AppStateProjectActions.swift", risk: "high", kind: "쓰기" },
          { id: "timeline.project-context", name: "프로젝트 컨텍스트 작업", detail: "프로젝트 이름 변경, 색상 변경, 숨김, 삭제 메뉴를 제공합니다.", source: "Features/Timeline/TimelineBoardRows.swift; TimelineBoardActions.swift", risk: "high", kind: "쓰기" },
          { id: "timeline.hidden-projects", name: "숨긴 프로젝트 관리", detail: "타임라인에서 프로젝트를 숨기고 설정에서 숨긴 목록 표시 여부를 조정합니다.", source: "Features/Timeline/TimelineBoardView.swift; Features/Setup/AppSettingsView.swift", risk: "mid", kind: "상태" },
          { id: "timeline.offscreen-arrows", name: "화면 밖 프로젝트 막대 화살표", detail: "프로젝트 막대가 현재 뷰포트 밖에 있을 때 좌우 이동 힌트를 표시합니다.", source: "Features/Timeline/TimelineBoardRows.swift", risk: "low", kind: "보조 UI" },
          { id: "timeline.badges", name: "작업 수 배지", detail: "프로젝트 행에 미완료, 기한 초과, 날짜 없음, 완료 작업 개수를 압축해서 보여줍니다.", source: "Features/Timeline/TimelineBoardRows.swift; TimelineBoardOverlays.swift", risk: "mid", kind: "화면" },
          { id: "timeline.task-hover-overlay", name: "작업 배지 호버 오버레이", detail: "배지를 가리키면 강한 작업, 예정 작업, 완료 작업 묶음을 보여주고 완료/편집 액션을 제공합니다.", source: "Features/Timeline/TimelineBoardOverlays.swift", risk: "mid", kind: "오버레이" },
          { id: "timeline.day-header-overlay", name: "날짜 헤더 호버 오버레이", detail: "날짜별 작업을 프로젝트 단위로 묶어 보여주며 선택한 날짜를 스케줄 뷰로 열 수 있습니다.", source: "Features/Timeline/TimelineBoardOverlays.swift; TimelineBoardActions.swift", risk: "mid", kind: "오버레이" },
          { id: "timeline.project-window", name: "프로젝트별 플로팅 작업 목록", detail: "프로젝트 행을 열어 별도 패널에서 작업 목록, 완료 표시, 카운트, 추가 버튼을 제공합니다.", source: "Features/Timeline/TimelineProjectListWindow.swift; TimelineProjectListWindowSnapshotFactory.swift", risk: "high", kind: "창" },
          { id: "timeline.task-crud", name: "타임라인 작업 생성/수정/삭제/완료", detail: "플로팅 목록과 오버레이에서 작업 제목, 완료 상태, 삭제, 재생성을 Reminders와 app-owned 저장소에 반영하고 실행 취소를 연결합니다.", source: "Features/Timeline/TimelineBoardActions.swift; Services/RetainedTaskCommandFacade.swift", risk: "core", kind: "쓰기" },
          { id: "timeline.task-order", name: "프로젝트 내부 작업 수동 정렬", detail: "플로팅 프로젝트 목록에서 작업 순서를 드래그로 바꾸고 app-owned 순서 상태로 저장합니다.", source: "Features/Timeline/TimelineProjectListWindow.swift; Services/AppOwnedWorkspaceStore.swift", risk: "high", kind: "정렬" },
          { id: "timeline.task-edit-panel", name: "작업 편집 패널", detail: "제목, 노트, 날짜, 시간, 기간을 편집하고 닫기/유휴 시점에 자동 저장합니다.", source: "Features/Timeline/TimelineTaskEditPopover.swift; LinkedTextEditor.swift", risk: "core", kind: "편집" },
          { id: "timeline.attachments", name: "작업 첨부파일 관리", detail: "파일 드롭으로 raw/assets에 복사하고 마크다운 링크 삽입, 열기, 삭제를 처리합니다.", source: "Features/Timeline/TimelineTaskEditPopover.swift; Services/TaskEditAttachmentService.swift", risk: "high", kind: "파일" },
          { id: "timeline.project-reorder", name: "우선순위 모드 프로젝트 드래그 정렬", detail: "단계 그룹 내 프로젝트 행 이동과 드롭 표시를 제공합니다.", source: "Features/Timeline/TimelineProjectDropSupport.swift; TimelineBoardActions.swift", risk: "mid", kind: "드래그" },
          { id: "timeline.blocked-mutations", name: "차단된 타임라인 변경 경로", detail: "작업 이동, 계획 작업 진행, 아카이브 같은 일부 오래된 변경 경로는 게이트로 막혀 있습니다.", source: "Services/RetainedCompatibilityTypes.swift; Features/Timeline/TimelineBoardActions.swift", risk: "blocked", kind: "현재 차단" }

          { id: "schedule.today-sync", name: "오늘 이동과 뷰포트 동기화", detail: "현재 날짜, 로딩 상태, 스크롤 위치, 뷰포트 진단을 스케줄 화면에 반영합니다.", source: "Features/Schedule/ScheduleBoardView.swift; App/AppStateWorkspaceUI.swift", risk: "mid", kind: "상태" },
          { id: "schedule.now-line", name: "현재 시간 표시선", detail: "오늘 컬럼에 현재 시간 라인을 초 단위 갱신으로 표시합니다.", source: "Features/Schedule/ScheduleBoardTimeGrid.swift", risk: "low", kind: "화면" },
          { id: "schedule.quick-add", name: "종일/시간 작업 빠른 추가", detail: "종일 영역과 시간 그리드에서 컨텍스트 메뉴 또는 드래그 프리뷰로 새 작업을 만듭니다.", source: "Features/Schedule/ScheduleBoardActions.swift; ScheduleBoardTimeGrid.swift", risk: "high", kind: "쓰기" },
          { id: "schedule.task-rendering", name: "워크스페이스 작업 일정 렌더링", detail: "날짜, 명시 시간, 기간, 프로젝트 색상, 완료/반복/준비 슬롯 표시를 일정 블록에 반영합니다.", source: "Features/Schedule/ScheduleEventStores.swift; ScheduleEventRenderingLayer.swift", risk: "core", kind: "화면" },
          { id: "schedule.task-drag", name: "작업 드래그 이동", detail: "작업을 날짜 간, 종일과 시간 영역 간 이동하고 15분 단위로 스냅합니다.", source: "Features/Schedule/ScheduleInteractionLayers.swift; ScheduleBoardTimeGrid.swift", risk: "core", kind: "드래그" },
          { id: "schedule.task-resize", name: "시간 작업 리사이즈", detail: "상단/하단 핸들로 시작 시간과 종료 시간을 바꾸고 프리뷰를 표시합니다.", source: "Features/Schedule/ScheduleBoardTimeGrid.swift; ScheduleInteractionLayers.swift", risk: "high", kind: "드래그" },

          { id: "diag.overlay-style", name: "오버레이 표면 스타일과 애니메이션 토큰", detail: "타임라인/스케줄 오버레이, 모션 트랜잭션, 애니메이션 토큰의 공통 스타일을 제공합니다.", source: "Utilities/OverlaySurfaceStyle.swift; MotionTransaction.swift; Features/Schedule/ScheduleAnimationEngine.swift", risk: "low", kind: "UI 기반" }

    const checkedState = loadState();
    let activeGroupId = "all";
    let activeStatusId = "all";

    const groupsEl = document.getElementById("groups");
    const navEl = document.getElementById("categoryNav");
    const statusFilterEl = document.getElementById("statusFilter");
    const searchInput = document.getElementById("searchInput");
    const onlyCheckedInput = document.getElementById("onlyCheckedInput");
    const outputEl = document.getElementById("selectionOutput");
    const emptyState = document.getElementById("emptyState");
    const totalCountEl = document.getElementById("totalCount");
    const visibleCountEl = document.getElementById("visibleCount");
    const trackCountEls = Object.fromEntries(TRACKS.map(track => [track.id, document.getElementById(`${track.id}Count`)]));

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        if (Object.keys(stored).length) return stored;
        const legacy = JSON.parse(localStorage.getItem(LEGACY_STORAGE_KEY) || "{}");
        return Object.fromEntries(Object.keys(legacy).filter(id => legacy[id]).map(id => [id, { remove: true }]));
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
    }

    function allItems() {
      return featureGroups.flatMap(group => group.items.map(item => ({ ...item, groupId: group.id, groupTitle: group.title })));
    }

    function isTracked(itemId, trackId) {
      if (checkedState[itemId] === true) return trackId === "remove";
      return Boolean(checkedState[itemId]?.[trackId]);
    }

    function hasAnyTrack(itemId) {
      return TRACKS.some(track => isTracked(itemId, track.id));
    }

    function setTracked(itemId, trackId, value) {
      const next = checkedState[itemId] === true ? { remove: true } : checkedState[itemId] || {};
      if (value) next[trackId] = true;
      else delete next[trackId];
      if (Object.keys(next).length) checkedState[itemId] = next;
      else delete checkedState[itemId];
    }

    function trackCount(trackId, items = allItems()) {
      return items.filter(item => isTracked(item.id, trackId)).length;
    }

    function riskClass(risk) {
      return ({ "매우 높음": "core", core: "core", 높음: "high", high: "high", 중간: "mid", mid: "mid", 낮음: "low", low: "low", blocked: "blocked" })[risk] || "mid";
    }

    function riskLabel(risk) {
      return ({ core: "삭제 난이도 매우 높음", high: "삭제 난이도 높음", mid: "삭제 난이도 중간", low: "삭제 난이도 낮음", blocked: "현재 차단/비활성" })[risk] || risk;
    }

    function matches(item, group, query, onlyChecked) {
      if (activeGroupId !== "all" && activeGroupId !== group.id) return false;
      if (activeStatusId !== "all" && !isTracked(item.id, activeStatusId)) return false;
      if (onlyChecked && !hasAnyTrack(item.id)) return false;
      if (!query) return true;
      const statusWords = TRACKS.filter(track => isTracked(item.id, track.id)).map(track => track.output).join(" ");
      const haystack = [group.title, group.note, item.name, item.detail, item.source, item.kind, riskLabel(item.risk), statusWords].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const onlyChecked = onlyCheckedInput.checked;
      const total = allItems().length;
      let visible = 0;

      renderStatusFilters();
      navEl.innerHTML = "";
      renderNavButton("all", "전체", total, allItems().filter(item => hasAnyTrack(item.id)).length);
      for (const group of featureGroups) {
        const groupChecked = group.items.filter(item => hasAnyTrack(item.id)).length;
        renderNavButton(group.id, group.title, group.items.length, groupChecked);
      }

      groupsEl.innerHTML = "";
      for (const group of featureGroups) {
        const visibleItems = group.items.filter(item => matches(item, group, query, onlyChecked));
        if (!visibleItems.length) continue;
        visible += visibleItems.length;
        groupsEl.appendChild(renderGroup(group, visibleItems));
      }

      totalCountEl.textContent = total;
      for (const track of TRACKS) trackCountEls[track.id].textContent = trackCount(track.id);
      visibleCountEl.textContent = visible;
      emptyState.style.display = visible ? "none" : "block";
      renderOutput();
    }

    function renderStatusFilters() {
      statusFilterEl.innerHTML = "";
      renderStatusButton("all", "전체 상태", allItems().filter(item => hasAnyTrack(item.id)).length);
      for (const track of TRACKS) renderStatusButton(track.id, track.label, trackCount(track.id));
    }

    function renderStatusButton(id, label, count) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = id === activeStatusId ? "active" : "";
      button.textContent = `${label} ${count}`;
      button.addEventListener("click", () => {
        activeStatusId = id;
        render();
      });
      statusFilterEl.appendChild(button);
    }

    function renderNavButton(id, label, count, checkedCount) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = id === activeGroupId ? "active" : "";
      button.innerHTML = `<span>${escapeHtml(label)}</span><span>${checkedCount}/${count}</span>`;
      button.addEventListener("click", () => {
        activeGroupId = id;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      navEl.appendChild(button);
    }

    function renderGroup(group, items) {
      const section = document.createElement("article");
      section.className = "group";
      section.id = `group-${group.id}`;

      const checkedInGroup = group.items.filter(item => hasAnyTrack(item.id)).length;
      section.innerHTML = `
        <div class="group-header">
          <div>
            <h2>${escapeHtml(group.title)} <span class="badge">${checkedInGroup}/${group.items.length}</span></h2>
            <p class="group-note">${escapeHtml(group.note)}</p>
          </div>
          <div class="group-actions">
            <button type="button" data-action="check-group">삭제 체크</button>
            <button type="button" data-action="clear-group">그룹 해제</button>
          </div>
        </div>
        <div class="items"></div>
      `;

      section.querySelector('[data-action="check-group"]').addEventListener("click", () => {
        group.items.forEach(item => setTracked(item.id, "remove", true));
        saveState();
        render();
      });
      section.querySelector('[data-action="clear-group"]').addEventListener("click", () => {
        group.items.forEach(item => delete checkedState[item.id]);
        saveState();
        render();
      });

      const itemsEl = section.querySelector(".items");
      for (const item of items) {
        itemsEl.appendChild(renderItem(item));
      }
      return section;
    }

    function renderItem(item) {
      const row = document.createElement("div");
      row.className = `item${hasAnyTrack(item.id) ? " tracked" : ""}`;
      row.innerHTML = `
        <div>
          <p class="item-title">${escapeHtml(item.name)}</p>
          <p class="item-detail">${escapeHtml(item.detail)}</p>
          <div class="source">${escapeHtml(item.source)}</div>
        </div>
        <div class="trackers" role="group" aria-label="${escapeHtml(item.name)} 상태">
          ${TRACKS.map(track => `
            <label class="track track-${track.id}">
              <input type="checkbox" data-track="${track.id}" ${isTracked(item.id, track.id) ? "checked" : ""} aria-label="${escapeHtml(`${item.name} ${track.output}`)}">
              <span>${escapeHtml(track.label)}</span>
            </label>
          `).join("")}
        </div>
        <div class="badges">
          <span class="badge ${riskClass(item.risk)}">${escapeHtml(riskLabel(item.risk))}</span>
          <span class="badge">${escapeHtml(item.kind)}</span>
        </div>
      `;
      row.querySelectorAll("input[data-track]").forEach(input => input.addEventListener("change", event => {
        setTracked(item.id, event.target.dataset.track, event.target.checked);
        saveState();
        render();
      }));
      return row;
    }

    function renderOutput() {
      const checked = allItems().map(item => ({
        ...item,
        statuses: TRACKS.filter(track => isTracked(item.id, track.id)).map(track => track.output)
      })).filter(item => item.statuses.length);
      if (!checked.length) {
        outputEl.value = "체크된 상태가 없습니다.";
        return;
      }
      outputEl.value = checked.map(item => `- [${item.groupTitle}] ${item.name}\n  status: ${item.statuses.join(", ")}\n  id: ${item.id}\n  source: ${item.source}`).join("\n");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    searchInput.addEventListener("input", render);
    onlyCheckedInput.addEventListener("change", render);

    document.getElementById("clearButton").addEventListener("click", () => {
      for (const key of Object.keys(checkedState)) delete checkedState[key];
      saveState();
      render();
    });

    document.getElementById("copyButton").addEventListener("click", async () => {
      outputEl.select();
      const text = outputEl.value;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        document.execCommand("copy");
      }
    });

    render();
  </script>
